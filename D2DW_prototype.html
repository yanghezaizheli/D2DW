<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#2f6f4f">
<title>D2DW 戸別訪問記録（プロト）</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
  :root{
    --brand:#2f6f4f; --green:#2e9e6b; --blue:#3b73c4; --amber:#d98a2b; --grey:#8a8a8a;
    --bg:#f5f6f4; --card:#fff; --text:#1f2421; --sub:#6b726e; --line:#e3e6e2;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN",Meiryo,sans-serif}
  #app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;padding-bottom:24px}
  .bar{position:sticky;top:0;z-index:500;background:var(--brand);color:#fff;display:flex;align-items:center;
    gap:8px;padding:12px 14px;box-shadow:0 1px 4px rgba(0,0,0,.15)}
  .bar h1{font-size:16px;margin:0;font-weight:600;flex:1;line-height:1.3}
  .bar .sub{font-size:11px;opacity:.85;font-weight:400}
  .back{background:rgba(255,255,255,.18);border:none;color:#fff;border-radius:8px;padding:6px 10px;
    font-size:14px;cursor:pointer}
  .screen{display:none}
  .screen.active{display:block}
  .map{width:100%;height:240px;background:#dde3df}
  .sectiontitle{font-size:12px;color:var(--sub);padding:14px 16px 6px;font-weight:600;letter-spacing:.02em}
  .list{padding:0 12px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin:8px 0;
    display:flex;align-items:center;gap:12px;cursor:pointer;transition:transform .05s}
  .card:active{transform:scale(.99)}
  .card .main{flex:1;min-width:0}
  .card .name{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px}
  .card .meta{font-size:12px;color:var(--sub);margin-top:4px;line-height:1.5}
  .card .meta b{color:var(--text);font-weight:600}
  .badge{font-size:11px;font-weight:700;color:#fff;border-radius:999px;padding:2px 8px;white-space:nowrap}
  .b-green{background:var(--green)} .b-blue{background:var(--blue)} .b-amber{background:var(--amber)} .b-grey{background:var(--grey)}
  .chev{color:#c2c8c3;font-size:20px}
  .apttag{font-size:10px;background:#eef2ef;color:var(--brand);border:1px solid #d6e0d9;border-radius:6px;padding:1px 6px;font-weight:700}
  .blockcard .stat{font-size:12px;color:var(--sub)}
  .blockcard .stat b{font-size:16px;color:var(--brand)}
  .pinwrap{display:flex;flex-direction:column;align-items:center}
  .pin{width:26px;height:26px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);
    border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center}
  .pin span{transform:rotate(45deg);color:#fff;font-size:11px;font-weight:700}
  .legend{font-size:11px;color:var(--sub);padding:8px 16px;display:flex;gap:14px;flex-wrap:wrap}
  .legend i{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:4px;vertical-align:middle}
  /* record screen */
  .rec-head{padding:16px;background:var(--card);border-bottom:1px solid var(--line)}
  .rec-head .nm{font-size:18px;font-weight:700}
  .rec-head .ad{font-size:12px;color:var(--sub);margin-top:2px}
  .stats{display:flex;gap:8px;padding:14px 16px}
  .stat-box{flex:1;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px;text-align:center}
  .stat-box .l{font-size:10px;color:var(--sub)}
  .stat-box .v{font-size:14px;font-weight:700;margin-top:4px}
  .choose{padding:6px 16px 0;font-size:13px;color:var(--sub);font-weight:600}
  .outcomes{display:flex;gap:10px;padding:10px 16px}
  .obtn{flex:1;border:2px solid var(--line);background:var(--card);border-radius:14px;padding:16px 6px;font-size:15px;
    font-weight:700;cursor:pointer;color:var(--text);display:flex;flex-direction:column;align-items:center;gap:6px}
  .obtn .ic{font-size:22px}
  .obtn.sel-met{border-color:var(--blue);background:#eaf1fb;color:var(--blue)}
  .obtn.sel-abs{border-color:var(--amber);background:#fdf3e6;color:var(--amber)}
  .obtn.sel-flyer{border-color:var(--grey);background:#f0f0f0;color:#555}
  .note{margin:6px 16px;width:calc(100% - 32px);border:1px solid var(--line);border-radius:10px;padding:10px;
    font-size:14px;font-family:inherit;resize:vertical;min-height:54px}
  .save{margin:10px 16px;width:calc(100% - 32px);background:var(--brand);color:#fff;border:none;border-radius:12px;
    padding:15px;font-size:16px;font-weight:700;cursor:pointer}
  .save:disabled{opacity:.4}
  .hist{padding:6px 16px 20px}
  .hist h3{font-size:12px;color:var(--sub);margin:10px 0 6px}
  .hrow{display:flex;justify-content:space-between;font-size:13px;padding:7px 0;border-bottom:1px dashed var(--line)}
  .hrow .o{font-weight:600}
  .o-met{color:var(--blue)} .o-abs{color:var(--amber)} .o-flyer{color:#666}
  .toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);background:#222;color:#fff;
    padding:11px 18px;border-radius:999px;font-size:14px;opacity:0;transition:.25s;z-index:1000;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .hint{font-size:11px;color:var(--sub);padding:4px 16px 0}
  .fab{position:absolute;right:16px;margin-top:-52px;background:#fff;border:1px solid var(--line);border-radius:999px;
    padding:8px 12px;font-size:12px;box-shadow:0 2px 6px rgba(0,0,0,.12);cursor:pointer;z-index:600}
</style>
</head>
<body>
<div id="app">
  <!-- Screen 1: 広域マップ -->
  <section id="s-broad" class="screen active">
    <div class="bar"><h1>戸別訪問記録 <span class="sub">D2DW プロト</span></h1></div>
    <div id="broadMap" class="map" style="height:260px"></div>
    <div class="fab" onclick="locate()">📍 現在地</div>
    <div class="legend">
      <span><i style="background:var(--green)"></i>未面会あり</span>
      <span><i style="background:var(--blue)"></i>完了</span>
      <span>ピン or 下のカードから区域へ</span>
    </div>
    <div class="sectiontitle">区域一覧</div>
    <div id="blockList" class="list"></div>
  </section>

  <!-- Screen 2: 区域詳細 -->
  <section id="s-block" class="screen">
    <div class="bar">
      <button class="back" onclick="go('broad')">← 区域</button>
      <h1 id="blockTitle"></h1>
    </div>
    <div id="detailMap" class="map"></div>
    <div class="hint">詳細地図上のピンをタップ → 記録入力（第2段階）。下のカードからも入力できます（第1段階）。</div>
    <div class="sectiontitle" id="blockProgress"></div>
    <div id="placeList" class="list"></div>
  </section>

  <!-- Screen 4: 号室一覧 -->
  <section id="s-apt" class="screen">
    <div class="bar">
      <button class="back" onclick="go('block')">← 区域</button>
      <h1 id="aptTitle"></h1>
    </div>
    <div class="hint" id="aptInfo"></div>
    <div class="sectiontitle">号室</div>
    <div id="unitList" class="list"></div>
  </section>

  <!-- Screen 3: 記録入力 -->
  <section id="s-rec" class="screen">
    <div class="bar">
      <button class="back" id="recBack">← 戻る</button>
      <h1>記録を入力</h1>
    </div>
    <div class="rec-head">
      <div class="nm" id="recName"></div>
      <div class="ad" id="recAddr"></div>
    </div>
    <div class="stats">
      <div class="stat-box"><div class="l">前回訪問</div><div class="v" id="stLastVisit">—</div></div>
      <div class="stat-box"><div class="l">前回面会</div><div class="v" id="stLastMet">—</div></div>
      <div class="stat-box"><div class="l">累計不在</div><div class="v" id="stAbsent">0回</div></div>
    </div>
    <div class="choose">今回の結果を選択</div>
    <div class="outcomes">
      <button class="obtn" data-o="会えた" onclick="pick('会えた')"><span class="ic">🙂</span>会えた</button>
      <button class="obtn" data-o="不在" onclick="pick('不在')"><span class="ic">🚪</span>不在</button>
      <button class="obtn" data-o="投函" onclick="pick('投函')"><span class="ic">✉️</span>投函</button>
    </div>
    <textarea class="note" id="recNote" placeholder="メモ（任意）"></textarea>
    <button class="save" id="saveBtn" disabled onclick="saveVisit()">保存して同期</button>
    <div class="hist" id="recHist"></div>
  </section>
</div>
<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
/* ============ モックデータ ============ */
const BLOCKS = [
  {id:'b2', code:'8-B', name:'01長住2', lat:33.55202, lng:130.39948},
  {id:'b1', code:'17-C', name:'01長住1', lat:33.55317, lng:130.40333},
];
// kind: house(戸建て) / apartment(集合住宅・親) / unit(号室)
// x,y は詳細地図(画像)上の座標（CRS.Simple, [y,x]）
let PLACES = [
  // --- 01長住2 ---
  {id:'p1', blockId:'b2', kind:'house', label:'長住2-3-1', name:'長住2-3-1', addr:'長住2丁目3-1', x:120, y:360,
    visits:[{o:'不在', at:'2026-05-12T10:20'},{o:'不在', at:'2026-06-02T11:00'}]},
  {id:'p2', blockId:'b2', kind:'house', label:'長住2-3-2', name:'長住2-3-2', addr:'長住2丁目3-2', x:230, y:330,
    visits:[{o:'投函', at:'2026-05-20T09:40'},{o:'会えた', at:'2026-06-15T14:10'}]},
  {id:'p3', blockId:'b2', kind:'house', label:'長住2-3-3', name:'長住2-3-3', addr:'長住2丁目3-3', x:340, y:380,
    visits:[{o:'不在', at:'2026-04-30T16:00'},{o:'不在', at:'2026-05-18T17:10'},{o:'不在', at:'2026-06-10T10:30'}]},
  {id:'p4', blockId:'b2', kind:'house', label:'長住2-3-5', name:'長住2-3-5', addr:'長住2丁目3-5', x:470, y:300, visits:[]},
  {id:'p5', blockId:'b2', kind:'house', label:'長住2-3-6', name:'長住2-3-6', addr:'長住2丁目3-6', x:560, y:360,
    visits:[{o:'投函', at:'2026-06-08T13:00'}]},
  // 集合住宅（親）
  {id:'apt1', blockId:'b2', kind:'apartment', label:'D-room長住北A', name:'D-room長住北A', addr:'長住2-3-1', x:300, y:170, visits:[]},
  // 号室（apt1の子）
  {id:'u101', blockId:'b2', kind:'unit', parentId:'apt1', label:'101', name:'D-room長住北A 101', addr:'長住2-3-1',
    visits:[{o:'会えた', at:'2026-06-12T19:00'}]},
  {id:'u102', blockId:'b2', kind:'unit', parentId:'apt1', label:'102', name:'D-room長住北A 102', addr:'長住2-3-1',
    visits:[{o:'不在', at:'2026-06-12T19:05'}]},
  {id:'u103', blockId:'b2', kind:'unit', parentId:'apt1', label:'103', name:'D-room長住北A 103', addr:'長住2-3-1', visits:[]},
  {id:'u201', blockId:'b2', kind:'unit', parentId:'apt1', label:'201', name:'D-room長住北A 201', addr:'長住2-3-1',
    visits:[{o:'不在', at:'2026-05-30T18:40'},{o:'不在', at:'2026-06-12T19:08'}]},
  {id:'u202', blockId:'b2', kind:'unit', parentId:'apt1', label:'202', name:'D-room長住北A 202', addr:'長住2-3-1', visits:[]},
  {id:'u203', blockId:'b2', kind:'unit', parentId:'apt1', label:'203', name:'D-room長住北A 203', addr:'長住2-3-1',
    visits:[{o:'投函', at:'2026-06-01T12:00'}]},
  // --- 01長住1 ---
  {id:'q1', blockId:'b1', kind:'house', label:'長住1-7-1', name:'長住1-7-1', addr:'長住1丁目7-1', x:150, y:320,
    visits:[{o:'会えた', at:'2026-06-18T15:30'}]},
  {id:'q2', blockId:'b1', kind:'house', label:'長住1-7-2', name:'長住1-7-2', addr:'長住1丁目7-2', x:300, y:300, visits:[]},
  {id:'q3', blockId:'b1', kind:'house', label:'長住1-7-3', name:'長住1-7-3', addr:'長住1丁目7-3', x:450, y:350,
    visits:[{o:'不在', at:'2026-06-05T10:00'}]},
];

/* ============ ロジック（訪問ログから集計） ============ */
function childrenOf(id){ return PLACES.filter(p=>p.parentId===id); }
function leavesOfBlock(b){ // 戸建て + 号室（集合住宅の親は数えない）
  return PLACES.filter(p=>p.blockId===b && (p.kind==='house'||p.kind==='unit'));
}
function derive(p){
  const vs = (p.visits||[]).slice().sort((a,b)=> new Date(b.at)-new Date(a.at));
  const last = vs[0]||null;
  const lastMet = vs.find(v=>v.o==='会えた')||null;
  const absent = vs.filter(v=>v.o==='不在').length;
  const flyer = vs.some(v=>v.o==='投函');
  let status='訪問可能', cls='b-green';
  if(lastMet){ status='面会済'; cls='b-blue'; }
  else if(absent>=3){ status='不在多'; cls='b-amber'; }
  else if(flyer){ status='投函済'; cls='b-grey'; }
  return {last, lastMet, absent, status, cls, count:vs.length};
}
// 集合住宅（親）の集計：子の状況をまとめる
function deriveApt(apt){
  const kids = childrenOf(apt.id);
  const met = kids.filter(k=>derive(k).status==='面会済').length;
  const total = kids.length;
  let lastAt=null;
  kids.forEach(k=>{ const d=derive(k); if(d.last){ const t=new Date(d.last.at); if(!lastAt||t>lastAt) lastAt=t; }});
  return {total, met, remaining:total-met, lastAt};
}
function fmtDate(s){ if(!s) return '—'; const d=new Date(s);
  return `${d.getFullYear()}/${p2(d.getMonth()+1)}/${p2(d.getDate())}`; }
function fmtDateTime(s){ if(!s) return '—'; const d=new Date(s);
  return `${d.getMonth()+1}/${p2(d.getDate())} ${p2(d.getHours())}:${p2(d.getMinutes())}`; }
function p2(n){ return String(n).padStart(2,'0'); }

/* ============ 画面遷移 ============ */
let cur='broad', curBlock=null, curApt=null, curPlace=null, recFrom='block', detailMap=null, sel=null;
function go(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('s-'+name).classList.add('active');
  cur=name; window.scrollTo(0,0);
}

/* ---- Screen 1 ---- */
function renderBroad(){
  const el=document.getElementById('blockList'); el.innerHTML='';
  BLOCKS.forEach(b=>{
    const leaves=leavesOfBlock(b.id);
    const met=leaves.filter(p=>derive(p).status==='面会済').length;
    const remaining=leaves.length-met;
    const cls = remaining>0?'b-green':'b-blue';
    const div=document.createElement('div'); div.className='card blockcard';
    div.onclick=()=>openBlock(b.id);
    div.innerHTML=`<div class="main">
        <div class="name">${b.name} <span class="badge ${cls}">${remaining>0?'未面会 '+remaining:'完了'}</span></div>
        <div class="meta">区域番号 ${b.code} ・ 全 <b>${leaves.length}</b> 戸 / 面会済 <b>${met}</b></div>
      </div><div class="chev">›</div>`;
    el.appendChild(div);
  });
}
let broadMap, userMarker;
function initBroad(){
  broadMap=L.map('broadMap',{zoomControl:true}).setView([33.5524,130.4010],16);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    {maxZoom:19, attribution:'© OpenStreetMap'}).addTo(broadMap);
  BLOCKS.forEach(b=>{
    const leaves=leavesOfBlock(b.id);
    const remaining=leaves.length-leaves.filter(p=>derive(p).status==='面会済').length;
    const color=remaining>0?'#2e9e6b':'#3b73c4';
    const icon=L.divIcon({className:'',html:`<div class="pinwrap"><div class="pin" style="background:${color}"><span>${remaining||'✓'}</span></div></div>`,
      iconSize:[26,26],iconAnchor:[13,26]});
    L.marker([b.lat,b.lng],{icon}).addTo(broadMap)
      .on('click',()=>openBlock(b.id))
      .bindTooltip(b.name,{direction:'top',offset:[0,-24]});
  });
}
function locate(){
  if(!navigator.geolocation){ toast('現在地を取得できません'); return; }
  navigator.geolocation.getCurrentPosition(pos=>{
    const {latitude:lat, longitude:lng}=pos.coords;
    if(userMarker) userMarker.remove();
    userMarker=L.circleMarker([lat,lng],{radius:8,color:'#fff',weight:2,fillColor:'#1a73e8',fillOpacity:1}).addTo(broadMap);
    broadMap.setView([lat,lng],16); toast('現在地を表示しました');
  }, ()=>toast('位置情報が許可されていません'), {enableHighAccuracy:true,timeout:8000});
}

/* ---- Screen 2 ---- */
function openBlock(id){
  curBlock=id; const b=BLOCKS.find(x=>x.id===id);
  document.getElementById('blockTitle').innerHTML=`${b.name} <span class="sub">区域 ${b.code}</span>`;
  const leaves=leavesOfBlock(id);
  const met=leaves.filter(p=>derive(p).status==='面会済').length;
  document.getElementById('blockProgress').textContent=`各戸カード（全 ${leaves.length} 戸 / 面会済 ${met} / 残り ${leaves.length-met}）`;
  renderPlaceList(id);
  go('block');
  setTimeout(()=>initDetailMap(id),60);
}
function renderPlaceList(id){
  const el=document.getElementById('placeList'); el.innerHTML='';
  // 戸建て＋集合住宅(親) を並べる
  PLACES.filter(p=>p.blockId===id && (p.kind==='house'||p.kind==='apartment')).forEach(p=>{
    const div=document.createElement('div'); div.className='card';
    if(p.kind==='apartment'){
      const a=deriveApt(p);
      div.onclick=()=>openApt(p.id);
      div.innerHTML=`<div class="main">
          <div class="name">${p.name} <span class="apttag">集合住宅</span></div>
          <div class="meta">全 <b>${a.total}</b> 室 / 面会済 <b>${a.met}</b> ・ 残り <b>${a.remaining}</b><br>
            前回訪問: <b>${fmtDate(a.lastAt)}</b></div>
        </div><div class="chev">›</div>`;
    } else {
      const d=derive(p);
      div.onclick=()=>openRecord(p.id,'block');
      div.innerHTML=cardInner(p,d);
    }
    el.appendChild(div);
  });
}
function cardInner(p,d){
  return `<div class="main">
      <div class="name">${p.label} <span class="badge ${d.cls}">${d.status}</span></div>
      <div class="meta">前回訪問 <b>${fmtDate(d.last&&d.last.at)}</b> ・ 前回面会 <b>${fmtDate(d.lastMet&&d.lastMet.at)}</b><br>
        累計不在 <b>${d.absent}回</b></div>
    </div><div class="chev">›</div>`;
}
function initDetailMap(id){
  if(detailMap){ detailMap.remove(); detailMap=null; }
  const W=680,H=460;
  const img='data:image/svg+xml;charset=UTF-8,'+encodeURIComponent(detailSvg(W,H));
  detailMap=L.map('detailMap',{crs:L.CRS.Simple,minZoom:-1,maxZoom:2,zoomControl:false,attributionControl:false});
  const bounds=[[0,0],[H,W]];
  L.imageOverlay(img,bounds).addTo(detailMap);
  detailMap.fitBounds(bounds);
  PLACES.filter(p=>p.blockId===id && (p.kind==='house'||p.kind==='apartment') && p.x!=null).forEach(p=>{
    const apt = p.kind==='apartment';
    const d = apt?null:derive(p);
    const color = apt?'#6a4fb3':(d.cls==='b-blue'?'#3b73c4':d.cls==='b-amber'?'#d98a2b':d.cls==='b-grey'?'#8a8a8a':'#2e9e6b');
    const icon=L.divIcon({className:'',iconSize:[22,22],iconAnchor:[11,22],
      html:`<div class="pin" style="width:22px;height:22px;background:${color}"><span style="font-size:9px">${apt?'集':''}</span></div>`});
    L.marker([p.y,p.x],{icon}).addTo(detailMap)
      .on('click',()=> apt?openApt(p.id):openRecord(p.id,'block'))
      .bindTooltip(p.label,{direction:'top'});
  });
  detailMap.invalidateSize();
}
function detailSvg(W,H){
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}">
    <rect width="${W}" height="${H}" fill="#eef1ec"/>
    <rect x="40" y="120" width="600" height="60" fill="#dfe4dd"/>
    <rect x="300" y="40" width="60" height="380" fill="#dfe4dd"/>
    <text x="50" y="40" fill="#9aa39c" font-size="16" font-family="sans-serif">詳細地図（実運用ではPDFをここに表示）</text>
    <text x="320" y="110" fill="#aeb6af" font-size="12" font-family="sans-serif">道路</text>
  </svg>`;
}

/* ---- Screen 4 (号室) ---- */
function openApt(id){
  curApt=id; const apt=PLACES.find(p=>p.id===id); const a=deriveApt(apt);
  document.getElementById('aptTitle').innerHTML=`${apt.name} <span class="sub">集合住宅</span>`;
  document.getElementById('aptInfo').textContent=`全 ${a.total} 室 / 面会済 ${a.met} ・ 残り ${a.remaining}。号室カードは各戸と同じ操作です。`;
  const el=document.getElementById('unitList'); el.innerHTML='';
  childrenOf(id).forEach(u=>{
    const d=derive(u); const div=document.createElement('div'); div.className='card';
    div.onclick=()=>openRecord(u.id,'apt');
    div.innerHTML=`<div class="main">
        <div class="name">${u.label}号室 <span class="badge ${d.cls}">${d.status}</span></div>
        <div class="meta">前回訪問 <b>${fmtDate(d.last&&d.last.at)}</b> ・ 前回面会 <b>${fmtDate(d.lastMet&&d.lastMet.at)}</b> ・ 不在 <b>${d.absent}回</b></div>
      </div><div class="chev">›</div>`;
    el.appendChild(div);
  });
  go('apt');
}

/* ---- Screen 3 (記録入力) ---- */
function openRecord(id, from){
  curPlace=id; recFrom=from; sel=null;
  const p=PLACES.find(x=>x.id===id); const d=derive(p);
  document.getElementById('recName').textContent = p.kind==='unit'? p.label+'号室（'+(PLACES.find(x=>x.id===p.parentId)||{}).name+'）' : p.name;
  document.getElementById('recAddr').textContent = p.addr||'';
  document.getElementById('stLastVisit').textContent=fmtDate(d.last&&d.last.at);
  document.getElementById('stLastMet').textContent=fmtDate(d.lastMet&&d.lastMet.at);
  document.getElementById('stAbsent').textContent=d.absent+'回';
  document.getElementById('recNote').value='';
  document.querySelectorAll('.obtn').forEach(b=>b.className='obtn');
  document.getElementById('saveBtn').disabled=true;
  // 履歴
  const h=document.getElementById('recHist');
  const vs=(p.visits||[]).slice().sort((a,b)=>new Date(b.at)-new Date(a.at));
  h.innerHTML='<h3>これまでの記録</h3>'+(vs.length?vs.map(v=>{
    const c=v.o==='会えた'?'o-met':v.o==='不在'?'o-abs':'o-flyer';
    return `<div class="hrow"><span class="o ${c}">${v.o}</span><span>${fmtDateTime(v.at)}</span></div>`;
  }).join(''):'<div class="hrow"><span>記録なし</span><span></span></div>');
  document.getElementById('recBack').onclick=()=>go(from==='apt'?'apt':'block');
  go('rec');
}
function pick(o){
  sel=o;
  document.querySelectorAll('.obtn').forEach(b=>{
    b.className='obtn'+(b.dataset.o===o?(o==='会えた'?' sel-met':o==='不在'?' sel-abs':' sel-flyer'):'');
  });
  document.getElementById('saveBtn').disabled=false;
}
function saveVisit(){
  if(!sel) return;
  const p=PLACES.find(x=>x.id===curPlace);
  const note=document.getElementById('recNote').value.trim();
  p.visits=p.visits||[];
  p.visits.push({o:sel, at:new Date().toISOString(), note});
  toast('記録しました（同期済み）');
  // 戻って一覧を更新
  if(recFrom==='apt'){ openApt(curApt); } else { renderPlaceList(curBlock); initDetailMap(curBlock); go('block'); }
  renderBroad();
}

/* ---- toast ---- */
let toastT;
function toast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),1800);
}

/* ---- init ---- */
renderBroad();
initBroad();
</script>
</body>
</html>
