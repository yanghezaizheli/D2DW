<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#2f6f4f">
<title>D2DW 編集ツール（PC）</title>
<style>
  :root{--brand:#2f6f4f;--green:#2e9e6b;--blue:#3b73c4;--amber:#d98a2b;--grey:#8a8a8a;--red:#c0473b;
    --bg:#f5f6f4;--card:#fff;--text:#1f2421;--sub:#6b726e;--line:#e3e6e2;}
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN",Meiryo,sans-serif}
  .bar{position:sticky;top:0;z-index:50;background:var(--brand);color:#fff;display:flex;align-items:center;gap:12px;padding:12px 18px;box-shadow:0 1px 4px rgba(0,0,0,.15)}
  .bar h1{font-size:17px;margin:0;font-weight:700;flex:1}
  .bar .sub{font-size:12px;opacity:.85;font-weight:400}
  .mini{background:rgba(255,255,255,.18);border:none;color:#fff;border-radius:8px;padding:7px 12px;font-size:13px;cursor:pointer}
  .screen{display:none}.screen.active{display:block}
  /* レイアウト: 左サイドバー + メイン */
  .layout{display:grid;grid-template-columns:300px 1fr;height:calc(100vh - 49px)}
  .sidebar{border-right:1px solid var(--line);background:#fff;overflow-y:auto;padding:12px}
  .content{overflow-y:auto;padding:18px 22px;max-width:900px}
  .side-h{font-size:12px;color:var(--sub);font-weight:700;margin:10px 4px 6px}
  .blockitem{padding:10px 12px;border:1px solid var(--line);border-radius:10px;margin:6px 0;cursor:pointer;background:#fff}
  .blockitem:hover{background:#f0f6f2}
  .blockitem.sel{border-color:var(--brand);background:#eaf4ee}
  .blockitem .bn{font-size:14px;font-weight:700}
  .blockitem .bs{font-size:12px;color:var(--sub);margin-top:2px}
  .navbtn{display:block;width:100%;text-align:left;padding:10px 12px;border:1px solid var(--line);border-radius:10px;margin:6px 0;background:#fff;font-size:13px;font-weight:700;cursor:pointer}
  .navbtn.sel{border-color:var(--brand);background:#eaf4ee;color:var(--brand)}
  h2.title{font-size:18px;margin:0 0 4px}
  .muted{font-size:13px;color:var(--sub);margin:0 0 14px}
  .panel{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:18px}
  .panel h3{margin:0 0 10px;font-size:14px}
  .grid{display:grid;grid-template-columns:1fr 160px;gap:10px}
  .grid .wide{grid-column:1 / -1}
  .grid input,.grid select{border:1px solid var(--line);border-radius:9px;padding:10px;font-size:14px;font-family:inherit;width:100%}
  label.fld{font-size:12px;color:var(--sub)}
  .actions{display:flex;gap:10px;margin-top:12px}
  .btn{border:1px solid var(--line);background:#fff;border-radius:10px;padding:10px 16px;font-size:14px;font-weight:700;cursor:pointer}
  .btn.primary{background:var(--brand);border-color:var(--brand);color:#fff}
  .btn.danger{border-color:#d9b4ae;color:var(--red)}
  .btn:disabled{opacity:.5;cursor:default}
  .row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;border-top:1px solid var(--line);padding:10px 0}
  .row:first-child{border-top:none}
  .row .nm{font-size:14px;font-weight:700}
  .row .meta{font-size:12px;color:var(--sub);margin-top:2px}
  .rowbtns{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
  .rowbtns button{border:1px solid var(--line);background:#fff;border-radius:9px;padding:8px 10px;font-size:13px;font-weight:700;cursor:pointer}
  .rowbtns .ord{width:38px;padding:8px 0;font-size:15px}
  .rowbtns .ord:disabled{opacity:.3;cursor:default}
  .rowbtns .del{color:var(--red);border-color:#d9b4ae}
  .badge{font-size:11px;font-weight:700;color:#fff;border-radius:999px;padding:2px 8px;white-space:nowrap}
  .b-green{background:var(--green)}.b-grey{background:var(--grey)}.b-red{background:var(--red)}
  .tag{font-size:11px;background:#eef2ef;color:var(--brand);border:1px solid #d6e0d9;border-radius:6px;padding:1px 6px;font-weight:700}
  .center{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:14px;padding:24px}
  .center h2{margin:0}
  .gbtn{display:flex;align-items:center;justify-content:center;gap:10px;background:#fff;color:#3c4043;border:1px solid #dadce0;border-radius:12px;padding:14px 22px;font-size:16px;font-weight:600;cursor:pointer}
  .err{color:var(--red);font-size:13px;min-height:18px}
  .spin{padding:60px;text-align:center;color:var(--sub)}
  .toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);background:#222;color:#fff;padding:11px 18px;border-radius:999px;font-size:14px;opacity:0;transition:.25s;z-index:1000;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .hint{font-size:12px;color:var(--sub)}
  .empty{font-size:13px;color:var(--sub);padding:12px 0}
  .userrow{border:1px solid var(--line);border-radius:10px;padding:12px;margin:8px 0;display:grid;grid-template-columns:1fr 160px;gap:8px;align-items:center}
  .userrow .un{font-size:14px;font-weight:700}.userrow .ue{font-size:12px;color:var(--sub);word-break:break-all;margin-top:2px}
  .userrow input,.userrow select{border:1px solid var(--line);border-radius:9px;padding:9px;font-size:13px;font-family:inherit;width:100%}
  .userrow .uacts{grid-column:1 / -1;display:flex;gap:8px}
  .userrow .uacts button{flex:1;border:1px solid var(--line);background:#fff;border-radius:9px;padding:9px;font-size:13px;font-weight:700;cursor:pointer}
  .userrow .uacts .del{color:var(--red)}
</style>
</head>
<body>
<div id="app">
  <!-- セットアップ未完了 -->
  <section id="s-setup" class="screen"><div class="center"><h2>セットアップ</h2><div class="hint">admin.html 冒頭の SUPABASE_URL / SUPABASE_ANON_KEY を設定してください。</div></div></section>

  <!-- ログイン -->
  <section id="s-login" class="screen">
    <div class="center">
      <h2>D2DW 編集ツール（PC）</h2>
      <div class="hint">区域カード・ユーザーの編集は管理者のみ</div>
      <div class="err" id="loginErr"></div>
      <button class="gbtn" id="googleBtn">Googleでログイン</button>
    </div>
  </section>

  <!-- ローディング -->
  <section id="s-loading" class="screen"><div class="spin" id="loadingMsg">読み込み中…</div></section>

  <!-- メイン -->
  <section id="s-main" class="screen">
    <div class="bar">
      <h1>D2DW 編集ツール <span class="sub" id="meName"></span></h1>
      <button class="mini" id="reloadBtn">↻ 再読込</button>
      <button class="mini" id="signoutBtn">ログアウト</button>
    </div>
    <div class="layout">
      <aside class="sidebar">
        <div class="side-h">区域一覧</div>
        <div id="blockList"></div>
        <div class="side-h">管理</div>
        <button class="navbtn" id="navUsers">ユーザー管理</button>
      </aside>
      <main class="content" id="content"></main>
    </div>
  </section>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

/* ===== Supabase 接続（index.html と同じプロジェクト） ===== */
const SUPABASE_URL = 'https://zjbceaqykutzwnvztryu.supabase.co';
const SUPABASE_ANON_KEY ='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpqYmNlYXF5a3V0endudnp0cnl1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMjc4NjEsImV4cCI6MjA5NzgwMzg2MX0.v6_PzKjILx7-7Lxa24V7uk7Qg1gtQ1u0mnBM8TuGWeQ';

const $ = s => document.querySelector(s);
const screens = ['setup','login','loading','main'];
function go(name){ screens.forEach(s=>$('#s-'+s).classList.toggle('active', s===name)); }
let sb, state={ user:null, role:null, blocks:[], stats:[], byId:{}, curBlock:null, view:'block', editingPlaceId:null, editingPlace:null };

/* ---------- 共通ヘルパ ---------- */
function esc(s){ return String(s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
let toastT; function toast(m){ const t=$('#toast'); t.textContent=m; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),1900); }
function errText(e){ if(!e) return '不明なエラー'; return e.message || e.error_description || e.msg || e.code || e.name || ('HTTP '+(e.status||'?')); }
const p2=n=>String(n).padStart(2,'0');
function fmtDate(s){ if(!s) return '—'; const d=new Date(s); return `${d.getFullYear()}/${p2(d.getMonth()+1)}/${p2(d.getDate())}`; }

const ROLE_DEFS=[['admin','管理者'],['moderator','司会者'],['member','利用者'],['viewer','閲覧者']];
const ROLE_ALIAS={'管理者':'admin','司会者':'moderator','利用者':'member','閲覧者':'viewer','admin':'admin','moderator':'moderator','member':'member','viewer':'viewer'};
function normalizeRole(v){ return ROLE_ALIAS[String(v||'').trim().toLowerCase()] || ROLE_ALIAS[String(v||'').trim()] || 'member'; }
function roleOptions(sel){ return ROLE_DEFS.map(([v,l])=>`<option value="${v}"${v===sel?' selected':''}>${l}</option>`).join(''); }
function validEmail(email){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email); }

const BLDG_TYPE_LABEL={'ST-M':'階段','EV-M':'エレベーター','AL-M':'オートロック'};
const RAW_TYPE_LABEL={'AL-M':'オートロック','EV-M':'エレベーター','ST-M':'階段','メゾネット':'メゾネット'};
function bldgLabel(r){ return RAW_TYPE_LABEL[r.place_type] || BLDG_TYPE_LABEL[r.base_type] || '集合住宅'; }
function placeTitle(r){ const nm=esc(r.display_name||''), ban=esc(r.label||''); return (nm+(ban?`[${ban}]`:''))||'—'; }
function statusInfo(r){
  const s=r.status||'訪問可能';
  if(s==='訪問拒否') return {label:'訪問拒否', cls:'b-red'};
  if(s!=='訪問可能') return {label:s, cls:'b-grey'};
  if(r.is_due) return {label:'訪問可能', cls:'b-green'};
  return {label:'対象外', cls:'b-grey'};
}
const childrenOf = pid => state.stats.filter(r=>r.parent_id===pid);
function blockTopPlaces(id){
  return state.stats.filter(r=>r.block_id===id && (r.kind==='戸建て'||r.kind==='集合住宅'))
    .sort((a,b)=>((a.sort_order??9999)-(b.sort_order??9999)) || String(a.display_name||a.label||'').localeCompare(String(b.display_name||b.label||''),'ja'));
}

/* ---------- 起動・認証（管理者のみ） ---------- */
const configured = /^https:\/\/[a-z0-9]+\.supabase\.co/i.test(SUPABASE_URL) && SUPABASE_ANON_KEY.startsWith('eyJ');
if(!configured){ go('setup'); } else { go('loading'); boot().catch(e=>{ $('#loadingMsg').textContent='接続に失敗: '+errText(e); }); }

async function boot(){
  sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const { data:{ session } } = await sb.auth.getSession();
  if(session){ onLogin(session.user); } else { go('login'); }
  sb.auth.onAuthStateChange((_e,s)=>{ if(s && !state.user){ onLogin(s.user); } if(!s){ state.user=null; go('login'); } });
}
$('#googleBtn').addEventListener('click', async ()=>{
  $('#loginErr').textContent='Googleに接続中…';
  const { error } = await sb.auth.signInWithOAuth({ provider:'google', options:{ redirectTo: window.location.origin + window.location.pathname } });
  if(error) $('#loginErr').textContent='失敗: '+errText(error);
});
$('#signoutBtn').addEventListener('click', ()=> sb.auth.signOut());

async function onLogin(user){
  state.user=user; $('#meName').textContent=user.email||''; go('loading');
  try{
    const { data:allowed } = await sb.rpc('is_allowed');
    if(allowed===false){ await sb.auth.signOut(); state.user=null; $('#loginErr').textContent='このアカウントは許可されていません。'; go('login'); return; }
  }catch(e){ console.warn('allowlist check skipped', e); }
  // ロール取得
  try{
    const { data:synced, error:se } = await sb.rpc('sync_member_from_allowlist');
    if(se) throw se;
    state.role = normalizeRole(synced?.[0]?.role);
  }catch(e){
    try{ const { data:m } = await sb.from('members').select('role').eq('id', user.id).single(); state.role=normalizeRole(m?.role); }
    catch(_){ state.role='member'; }
  }
  if(state.role!=='admin'){
    $('#loginErr').textContent='この編集ツールは管理者のみ利用できます（あなたの権限: '+(state.role||'?')+'）。';
    await sb.auth.signOut(); state.user=null; go('login'); return;
  }
  await reloadData();
  go('main'); renderSidebar(); renderContent();
}

/* ---------- データ取得 ---------- */
async function reloadData(){
  const [b, s, p] = await Promise.all([
    sb.from('blocks').select('*').order('name'),
    sb.from('place_stats').select('*'),
    sb.from('places').select('id,sort_order')
  ]);
  if(b.error) throw b.error;
  if(s.error) throw s.error;
  const orderById=Object.fromEntries((p.data||[]).map(x=>[x.id, x.sort_order ?? 0]));
  state.blocks=b.data||[];
  state.stats=(s.data||[]).map(r=>({ ...r, sort_order: orderById[r.place_id] ?? r.sort_order ?? 0 }));
  state.byId=Object.fromEntries(state.stats.map(r=>[r.place_id,r]));
}
$('#reloadBtn').addEventListener('click', async ()=>{ try{ await reloadData(); renderSidebar(); renderContent(); toast('再読込しました'); }catch(e){ toast('再読込失敗: '+errText(e)); } });
$('#navUsers').addEventListener('click', ()=>{ state.view='users'; state.curBlock=null; renderSidebar(); renderContent(); });

/* ---------- サイドバー（区域一覧） ---------- */
function renderSidebar(){
  const el=$('#blockList'); el.innerHTML='';
  state.blocks.forEach(b=>{
    const lv=state.stats.filter(r=>r.block_id===b.id && (r.kind==='戸建て'||r.kind==='号室'));
    const due=lv.filter(r=>r.is_due).length;
    const div=document.createElement('div');
    div.className='blockitem'+(state.view==='block'&&state.curBlock===b.id?' sel':'');
    div.innerHTML=`<div class="bn">${esc(b.name||'(無名区域)')}</div><div class="bs">区域 ${esc(b.code||'')} ・ 全${lv.length}戸 / 訪問可${due}</div>`;
    div.onclick=()=>{ state.view='block'; state.curBlock=b.id; state.editingPlaceId=null; state.editingPlace=null; renderSidebar(); renderContent(); };
    el.appendChild(div);
  });
  $('#navUsers').classList.toggle('sel', state.view==='users');
}

/* ---------- メイン表示の切替 ---------- */
function renderContent(){
  if(state.view==='users'){ renderUserPanel(); return; }
  if(state.curBlock){ renderCardPanel(); return; }
  $('#content').innerHTML='<h2 class="title">区域を選んでください</h2><p class="muted">左の区域一覧から選ぶと、その区域のカードを編集できます。</p>';
}

/* ---------- カード管理 ---------- */
const PLACE_STATUSES=['訪問可能','訪問拒否','他言語','JW','転居・空家'];
const APT_TYPES=[['AL-M','オートロック'],['EV-M','エレベーター'],['ST-M','階段'],['メゾネット','メゾネット']];
function editAptType(p){ return (p && ['AL-M','EV-M','ST-M','メゾネット'].includes(p.type)) ? p.type : 'AL-M'; }
function applyCardFormMode(){
  const apt = $('#pmKind') && $('#pmKind').value==='集合住宅';
  document.querySelectorAll('.pm-house').forEach(el=>el.style.display=apt?'none':'');
  document.querySelectorAll('.pm-apt').forEach(el=>el.style.display=apt?'':'none');
  const mgrIn = apt && $('#pmMgr') && $('#pmMgr').value==='いる';
  if($('#pmMgrHours')) $('#pmMgrHours').style.display=mgrIn?'':'none';
}
function renderCardPanel(){
  const b=state.blocks.find(x=>x.id===state.curBlock);
  const places=blockTopPlaces(state.curBlock);
  const ed=state.editingPlace, editing=!!state.editingPlaceId;
  const isApt = ed ? ed.kind==='集合住宅' : false;
  const fName=ed?esc(ed.display_name||''):'', fAddr=ed?esc(ed.label||''):'', fNote=ed?esc(ed.note||''):'';
  const fStatus=(ed&&ed.status)||'訪問可能', fAptType=editAptType(ed);
  const fMgr=(ed&&ed.has_manager)?'いる':'いない', fHours=ed?esc(ed.manager_hours||''):'';
  const statusOpts=PLACE_STATUSES.map(s=>`<option value="${s}"${s===fStatus?' selected':''}>${s}</option>`).join('');
  const aptOpts=APT_TYPES.map(([v,l])=>`<option value="${v}"${v===fAptType?' selected':''}>${l}</option>`).join('');
  const rows=places.map((r,i)=>{
    const si=statusInfo(r);
    const kindLabel = r.kind==='集合住宅' ? bldgLabel(r)+`・${childrenOf(r.place_id).length}室` : '戸建て';
    return `<div class="row"><div><div class="nm">${placeTitle(r)} <span class="badge ${si.cls}">${si.label}</span></div><div class="meta">${kindLabel}</div></div>`+
      `<div class="rowbtns">`+
      `<button class="ord" data-mv="up" data-pid="${r.place_id}"${i===0?' disabled':''}>↑</button>`+
      `<button class="ord" data-mv="down" data-pid="${r.place_id}"${i===places.length-1?' disabled':''}>↓</button>`+
      `<button class="edit" data-edit="${r.place_id}">編集</button>`+
      `<button class="del" data-del="${r.place_id}" data-label="${esc(r.display_name||r.label||'このカード')}">削除</button></div></div>`;
  }).join('');
  $('#content').innerHTML=
    `<h2 class="title">${esc(b?.name||'')} <span class="muted" style="font-size:13px">区域 ${esc(b?.code||'')}</span></h2>`+
    `<div class="panel"><h3>${editing?'カードを編集':'単体カードを追加'}</h3>`+
      `<div class="grid">`+
        `<label class="fld wide">種別<select id="pmKind">`+
          `<option value="戸建て"${!isApt?' selected':''}>戸建てタイプ（直接記録）</option>`+
          `<option value="集合住宅"${isApt?' selected':''}>集合住宅（号室あり）</option></select></label>`+
        `<input class="wide" id="pmName" placeholder="名前 / 建物名" value="${fName}">`+
        `<input class="wide" id="pmAddr" placeholder="住所" value="${fAddr}">`+
        `<select class="wide pm-house" id="pmStatus">${statusOpts}</select>`+
        `<input class="wide pm-house" id="pmNote" placeholder="メモ（任意）" value="${fNote}">`+
        `<select class="wide pm-apt" id="pmAptType">${aptOpts}</select>`+
        `<label class="fld wide pm-apt">管理人 <select id="pmMgr"><option ${fMgr==='いない'?'selected':''}>いない</option><option ${fMgr==='いる'?'selected':''}>いる</option></select></label>`+
        `<input class="wide pm-apt" id="pmMgrHours" placeholder="勤務日時（空欄は『勤務日時不明』）" value="${fHours}">`+
      `</div>`+
      `<div class="actions"><button class="btn primary" id="pmSave">${editing?'更新':'追加'}</button>`+
        `${editing?'<button class="btn" id="pmCancel">やめる</button>':''}</div>`+
    `</div>`+
    `<div class="panel"><h3>カード一覧（${places.length}件）</h3>`+
      (rows || '<div class="empty">この区域にはカードがありません。上のフォームから追加できます。</div>')+
      (places.length?`<div class="actions"><button class="btn danger" id="delAll">この区域の全カード削除</button></div>`:'')+
    `</div>`;
  $('#pmKind').addEventListener('change', applyCardFormMode);
  $('#pmMgr').addEventListener('change', applyCardFormMode);
  applyCardFormMode();
  $('#pmSave').addEventListener('click', savePlaceCard);
  const c=$('#pmCancel'); if(c) c.addEventListener('click', ()=>{ state.editingPlaceId=null; state.editingPlace=null; renderCardPanel(); });
  const delAll=$('#delAll'); if(delAll) delAll.addEventListener('click', deleteAllBlockPlaces);
  $('#content').querySelectorAll('[data-mv]').forEach(btn=>btn.addEventListener('click', ()=>moveCard(btn.dataset.pid, btn.dataset.mv)));
  $('#content').querySelectorAll('[data-edit]').forEach(btn=>btn.addEventListener('click', ()=>startEditPlace(btn.dataset.edit)));
  $('#content').querySelectorAll('[data-del]').forEach(btn=>btn.addEventListener('click', ()=>deletePlaceCard(btn.dataset.del, btn.dataset.label)));
}
async function savePlaceCard(){
  if(!state.curBlock) return;
  const kind=$('#pmKind').value;
  const name=$('#pmName').value.trim(), addr=$('#pmAddr').value.trim();
  if(!name && !addr) return toast('名前か住所を入力してください');
  let patch;
  if(kind==='集合住宅'){
    const mgrIn=$('#pmMgr').value==='いる';
    patch={ kind:'集合住宅', type:$('#pmAptType').value, display_name:name||null, label:addr||null,
      status:'訪問可能', note:null, has_manager:mgrIn, manager_hours: mgrIn ? ($('#pmMgrHours').value.trim()||'勤務日時不明') : null };
  } else {
    patch={ kind:'戸建て', type:null, display_name:name||null, label:addr||null,
      status:$('#pmStatus').value||'訪問可能', note:$('#pmNote').value.trim()||null, has_manager:false, manager_hours:null };
  }
  const btn=$('#pmSave'); btn.disabled=true;
  let error;
  if(state.editingPlaceId){ ({error}=await sb.from('places').update(patch).eq('id', state.editingPlaceId)); }
  else { patch.block_id=state.curBlock; patch.sort_order=blockTopPlaces(state.curBlock).length; ({error}=await sb.from('places').insert(patch)); }
  btn.disabled=false;
  if(error){ toast('保存失敗（管理者権限が必要）: '+errText(error)); return; }
  toast(state.editingPlaceId?'カードを更新しました':'カードを追加しました');
  state.editingPlaceId=null; state.editingPlace=null;
  await reloadData(); renderSidebar(); renderCardPanel();
}
async function startEditPlace(placeId){
  const { data, error } = await sb.from('places').select('display_name,label,status,note,type,kind,has_manager,manager_hours').eq('id',placeId).single();
  if(error){ toast('取得失敗: '+errText(error)); return; }
  state.editingPlaceId=placeId; state.editingPlace=data; renderCardPanel();
  $('#content').scrollTo({top:0, behavior:'smooth'});
}
async function deletePlaceCard(placeId, label){
  if(!confirm(`「${label}」を削除しますか？\n集合住宅の場合は号室と訪問記録も削除されます。`)) return;
  const { error } = await sb.from('places').delete().eq('id', placeId);
  if(error){ toast('削除失敗: '+errText(error)); return; }
  toast('カードを削除しました');
  await reloadData(); renderSidebar(); renderCardPanel();
}
async function deleteAllBlockPlaces(){
  const count=blockTopPlaces(state.curBlock).length;
  if(!count) return;
  if(!confirm(`この区域の各戸カード ${count} 件をすべて削除しますか？\n区域カード自体は残ります。集合住宅の号室と訪問記録も削除されます。`)) return;
  if(!confirm('本当に全削除しますか？元に戻せません。')) return;
  const { error } = await sb.from('places').delete().eq('block_id', state.curBlock).is('parent_id', null);
  if(error){ toast('全削除失敗: '+errText(error)); return; }
  toast('この区域のカードをすべて削除しました');
  await reloadData(); renderSidebar(); renderCardPanel();
}
async function moveCard(placeId, dir){
  const arr=blockTopPlaces(state.curBlock);
  const i=arr.findIndex(r=>r.place_id===placeId); if(i<0) return;
  const j = dir==='up'? i-1 : i+1; if(j<0 || j>=arr.length) return;
  [arr[i],arr[j]]=[arr[j],arr[i]];
  for(let idx=0; idx<arr.length; idx++){
    const r=arr[idx];
    if((r.sort_order??0)!==idx){
      const { error } = await sb.from('places').update({sort_order:idx}).eq('id', r.place_id);
      if(error){ toast('並び替え保存失敗: '+errText(error)); return; }
      r.sort_order=idx;
    }
  }
  renderCardPanel();
}

/* ---------- ユーザー管理 ---------- */
function renderUserPanel(){
  $('#content').innerHTML=
    `<h2 class="title">ユーザー管理</h2><p class="muted">許可リスト（allowed_emails）に載るGoogleアカウントだけがアプリを使えます。</p>`+
    `<div class="panel"><h3>ユーザーを追加</h3>`+
      `<div class="grid">`+
        `<input class="wide" id="adName" placeholder="ユーザー名">`+
        `<input id="adEmail" type="email" placeholder="user@example.com">`+
        `<select id="adRole">${roleOptions('member')}</select>`+
        `<input class="wide" id="adNote" placeholder="メモ（任意・担当区域など）">`+
      `</div><div class="actions"><button class="btn primary" id="adAdd">ユーザーを追加</button></div>`+
    `</div>`+
    `<div class="panel"><h3>登録ユーザー</h3><div id="userList"><div class="empty">読み込み中…</div></div></div>`;
  $('#adAdd').addEventListener('click', addUser);
  loadUsers();
}
async function loadUsers(){
  const list=$('#userList');
  const [{ data:allowed, error }, { data:members }] = await Promise.all([
    sb.from('allowed_emails').select('email,display_name,role,note').order('email'),
    sb.from('members').select('email,name,role')
  ]);
  if(error){ list.innerHTML='<div class="empty">読み込み失敗: '+esc(errText(error))+'</div>'; return; }
  const byEmail=Object.fromEntries((members||[]).filter(m=>m.email).map(m=>[String(m.email).toLowerCase(), m]));
  const rows=(allowed||[]).map(r=>({ ...r, resolved_name: r.display_name || byEmail[String(r.email||'').toLowerCase()]?.name || '' }));
  if(!rows.length){ list.innerHTML='<div class="empty">登録ユーザーなし</div>'; return; }
  list.innerHTML='';
  rows.forEach(row=>{
    const div=document.createElement('div'); div.className='userrow'; div.dataset.email=row.email;
    div.innerHTML=`<div><div class="un">${esc(row.resolved_name||'名前未設定')}</div><div class="ue">${esc(row.email)}</div></div>`+
      `<select class="urole">${roleOptions(normalizeRole(row.role))}</select>`+
      `<input class="uname" value="${esc(row.display_name||row.resolved_name||'')}" placeholder="ユーザー名">`+
      `<input class="unote" value="${esc(row.note||'')}" placeholder="メモ">`+
      `<div class="uacts"><button class="save">更新</button><button class="del">削除</button></div>`;
    div.querySelector('.save').addEventListener('click', ()=>saveUser(div));
    div.querySelector('.del').addEventListener('click', ()=>deleteUser(div.dataset.email));
    list.appendChild(div);
  });
}
async function upsertUser(email, name, role, note){
  email=String(email||'').trim().toLowerCase(); name=String(name||'').trim()||null; role=normalizeRole(role); note=String(note||'').trim()||null;
  if(!validEmail(email)) throw new Error('メール形式が不正です: '+email);
  const { error } = await sb.from('allowed_emails').upsert({ email, display_name:name, role, note }, { onConflict:'email' });
  if(error) throw error;
  await sb.from('members').update(name?{role,email,name}:{role,email}).eq('email', email);
}
async function addUser(){
  try{
    await upsertUser($('#adEmail').value, $('#adName').value, $('#adRole').value, $('#adNote').value);
    $('#adName').value=''; $('#adEmail').value=''; $('#adNote').value='';
    toast('ユーザーを追加しました'); loadUsers();
  }catch(e){ toast('追加失敗: '+errText(e)); }
}
async function saveUser(row){
  try{
    await upsertUser(row.dataset.email, row.querySelector('.uname').value, row.querySelector('.urole').value, row.querySelector('.unote').value);
    toast('ユーザーを更新しました'); loadUsers();
  }catch(e){ toast('更新失敗: '+errText(e)); }
}
async function deleteUser(email){
  email=String(email||'').trim().toLowerCase();
  if(email===String(state.user?.email||'').trim().toLowerCase()) return toast('自分自身は削除できません');
  if(!confirm(email+' を許可リストから削除しますか？')) return;
  const { error } = await sb.from('allowed_emails').delete().eq('email', email);
  if(error){ toast('削除失敗: '+errText(error)); return; }
  toast('ユーザーを削除しました'); loadUsers();
}
</script>
